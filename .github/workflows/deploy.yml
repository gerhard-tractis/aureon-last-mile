name: Deploy Production

on:
  push:
    branches: [main]

# All deploy jobs run sequentially — a failed migration never reaches app deploys
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ─── 1. Database Migrations ──────────────────────────────────────────────────
  deploy-supabase:
    name: Deploy Supabase Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  # ─── 2. Edge Functions ───────────────────────────────────────────────────────
  deploy-edge-functions:
    name: Deploy Supabase Edge Functions
    needs: deploy-supabase
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ─── 3. Frontend (Vercel) ────────────────────────────────────────────────────
  deploy-vercel:
    name: Deploy to Vercel
    needs: [deploy-supabase, deploy-edge-functions]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        id: deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: apps/frontend

      - name: Rollback on failure
        if: failure()
        run: |
          npm i -g vercel
          vercel rollback --yes --token=${{ secrets.VERCEL_TOKEN }}
          echo "::error::Vercel deployment failed — rolled back to previous version"

  # ─── 3. Worker (VPS) ─────────────────────────────────────────────────────────
  deploy-worker:
    name: Deploy Worker to VPS
    needs: [deploy-supabase, deploy-edge-functions]
    runs-on: [self-hosted, vps]
    timeout-minutes: 10
    steps:
      - name: Pull latest code
        run: |
          cd ~/aureon-last-mile
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git pull origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for worker changes
        id: worker-changes
        run: |
          CHANGED=$(cd ~/aureon-last-mile && git diff ${{ github.event.before }} ${{ github.sha }} --name-only -- apps/worker/ | wc -l)
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Deploy worker
        if: steps.worker-changes.outputs.changed != '0'
        run: bash ~/aureon-last-mile/apps/worker/scripts/deploy.sh

      - name: No worker changes
        if: steps.worker-changes.outputs.changed == '0'
        run: echo "No apps/worker changes detected — skipping worker deploy"

      - name: Report failure
        if: failure()
        run: |
          echo "::error::VPS worker deployment failed."
          echo "To debug: sudo journalctl -u aureon-worker -n 50"
