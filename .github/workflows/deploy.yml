name: Deploy Production

on:
  push:
    branches: [main]

# All deploy jobs run sequentially within their dependency chain — a failed
# migration never reaches app deploys. Jobs are gated on path filters so a
# CSS-only or docs-only push doesn't trigger DB or VPS work.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ─── 0. Detect what changed ──────────────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      database: ${{ steps.filter.outputs.database }}
      edge_functions: ${{ steps.filter.outputs.edge_functions }}
      worker: ${{ steps.filter.outputs.worker }}
      agents: ${{ steps.filter.outputs.agents }}
      solver: ${{ steps.filter.outputs.solver }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            database:
              - 'packages/database/supabase/migrations/**'
              - 'packages/database/supabase/seed.sql'
              - 'packages/database/supabase/config.toml'
            edge_functions:
              - 'packages/database/supabase/functions/**'
            worker:
              - 'apps/worker/**'
            agents:
              - 'apps/agents/**'
            solver:
              - 'sidecar/or-tools/**'

  # ─── 1. Database Migrations ──────────────────────────────────────────────────
  deploy-supabase:
    name: Deploy Supabase Migrations
    needs: changes
    if: needs.changes.outputs.database == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/database
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  # ─── 2. Edge Functions ───────────────────────────────────────────────────────
  deploy-edge-functions:
    name: Deploy Supabase Edge Functions
    needs: [changes, deploy-supabase]
    if: |
      always() &&
      needs.changes.outputs.edge_functions == 'true' &&
      (needs.deploy-supabase.result == 'success' || needs.deploy-supabase.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/database
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ─── 3. Frontend (Vercel) ────────────────────────────────────────────────────
  # NOTE: Vercel's Git integration deploys automatically on push to main and
  # runs in parallel with this workflow. This job exists to (a) enforce the
  # "migrations before app code" ordering and (b) provide rollback-on-failure.
  # It only runs when DB or edge function migrations actually shipped — for
  # pure frontend pushes, the Vercel Git integration is the source of truth.
  deploy-vercel:
    name: Deploy to Vercel
    needs: [changes, deploy-supabase, deploy-edge-functions]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.changes.outputs.database == 'true' || needs.changes.outputs.edge_functions == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        id: deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Rollback on failure
        if: failure()
        run: |
          npm i -g vercel
          vercel rollback --yes --token=${{ secrets.VERCEL_TOKEN }}
          echo "::error::Vercel deployment failed — rolled back to previous version"

  # ─── 4. Worker (VPS) ─────────────────────────────────────────────────────────
  deploy-worker:
    name: Deploy Worker to VPS
    needs: [changes, deploy-supabase, deploy-edge-functions]
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.changes.outputs.worker == 'true'
    runs-on: [self-hosted, vps]
    timeout-minutes: 10
    steps:
      - name: Pull latest code
        run: |
          cd ~/aureon-last-mile
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git pull origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy worker
        run: bash ~/aureon-last-mile/apps/worker/scripts/deploy.sh

      - name: Report failure
        if: failure()
        run: |
          echo "::error::VPS worker deployment failed."
          echo "To debug: sudo journalctl -u aureon-worker -n 50"

  # ─── 5. Agents Suite (VPS) ───────────────────────────────────────────────────
  deploy-agents:
    name: Deploy Agents to VPS
    needs: [changes, deploy-supabase, deploy-edge-functions]
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.changes.outputs.agents == 'true'
    runs-on: [self-hosted, vps]
    timeout-minutes: 10
    steps:
      - name: Pull latest code
        run: |
          cd ~/aureon-last-mile
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git pull origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy agents
        run: bash ~/aureon-last-mile/apps/agents/scripts/deploy.sh

      - name: Report failure
        if: failure()
        run: |
          echo "::error::VPS agents deployment failed."
          echo "To debug: sudo journalctl -u aureon-agents -n 50"

  # ─── 6. OR-Tools Solver Sidecar (VPS) ────────────────────────────────────────
  deploy-solver:
    name: Deploy OR-Tools Solver to VPS
    needs: [changes, deploy-supabase, deploy-edge-functions]
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.changes.outputs.solver == 'true'
    runs-on: [self-hosted, vps]
    timeout-minutes: 10
    steps:
      - name: Pull latest code
        run: |
          cd ~/sidecar
          git pull origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies and restart
        run: |
          cd ~/sidecar/sidecar/or-tools
          source ~/.venv/bin/activate
          pip install --no-cache-dir -r requirements.txt
          sudo cp aureon-solver.service /etc/systemd/system/
          sudo systemctl daemon-reload
          sudo systemctl restart aureon-solver
          sleep 2
          curl -sf http://127.0.0.1:8090/api/v1/health

      - name: Report failure
        if: failure()
        run: |
          echo "::error::OR-Tools solver deployment failed."
          echo "To debug: sudo journalctl -u aureon-solver -n 50"
