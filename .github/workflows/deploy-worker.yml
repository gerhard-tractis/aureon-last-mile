name: Deploy Worker to VPS

# Triggers on pushes to main that affect worker code or scripts
on:
  push:
    branches: [main]
    paths:
      - 'apps/worker/**'

# Prevent simultaneous deploys (never cancel in-progress — finish the running deploy)
concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy-worker:
    name: Deploy Worker to VPS
    runs-on: [self-hosted, vps]
    timeout-minutes: 10

    steps:
      - name: Pull latest code
        run: cd ~/aureon-last-mile && git pull origin main

      - name: Deploy worker
        run: bash ~/aureon-last-mile/apps/worker/scripts/deploy.sh

      - name: Report failure
        if: failure()
        run: |
          echo "::error::VPS deployment failed."
          echo "To debug, check worker logs:"
          echo "  sudo journalctl -u aureon-worker -n 50"
